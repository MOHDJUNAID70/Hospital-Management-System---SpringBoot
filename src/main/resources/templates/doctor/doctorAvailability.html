<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Doctor Availability</title>
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(120deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
        }
        .availability-container {
            max-width: 900px;
            margin: 48px auto 0 auto;
            background: rgba(255,255,255,0.98);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(44,62,80,0.10);
            padding: 40px 32px 32px 32px;
            position: relative;
        }
        .availability-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 32px;
            color: #232946;
            letter-spacing: 1px;
            text-shadow: 0 2px 8px rgba(0,198,255,0.08);
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #232946;
            font-weight: 700;
            font-size: 1.08rem;
            margin-bottom: 18px;
            padding: 8px 16px;
            border-radius: 10px;
            transition: background 0.2s, color 0.2s;
        }
        .back-link:hover {
            background: linear-gradient(90deg, #00c6ff 0%, #232946 100%);
            color: #fff;
        }
        .back-link i {
            font-size: 1.1rem;
        }
        .add-btn {
            background: linear-gradient(90deg, #00c6ff 0%, #232946 100%);
            color: #fff;
            font-weight: 700;
            border-radius: 10px;
            font-size: 1.08rem;
            padding: 10px 26px;
            margin-bottom: 18px;
            box-shadow: 0 2px 8px rgba(0,198,255,0.10);
            border: none;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .add-btn:hover {
            background: linear-gradient(90deg, #232946 0%, #00c6ff 100%);
            color: #fff;
        }
        .avail-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            justify-content: center;
        }
        .avail-card {
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(44,62,80,0.10);
            padding: 28px 24px 20px 24px;
            min-width: 220px;
            max-width: 260px;
            flex: 1 1 220px;
            text-align: center;
            transition: box-shadow 0.2s, transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .avail-card:hover {
            box-shadow: 0 8px 32px rgba(0,198,255,0.18);
            transform: translateY(-4px);
        }
        .avail-card .card-icon {
            font-size: 2.2rem;
            color: #00c6ff;
            margin-bottom: 10px;
        }
        .avail-card .card-day {
            font-size: 1.3rem;
            font-weight: 800;
            color: #232946;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .avail-card .card-time {
            font-size: 1.05rem;
            color: #555;
            margin-bottom: 4px;
        }
        .avail-card .card-time span {
            font-weight: 700;
            color: #232946;
        }
        .avail-card .card-actions {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 18px;
            width: 100%;
            border-top: 1px solid #e3e9f7;
            padding-top: 14px;
        }
        .view-btn {
            background: none;
            border: 2px solid #00c6ff;
            color: #00c6ff;
            font-weight: 700;
            border-radius: 8px;
            font-size: 0.95rem;
            padding: 5px 14px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .view-btn:hover {
            background: #00c6ff;
            color: #fff;
        }
        .no-data {
            text-align: center;
            color: #a94442;
            font-size: 1.2rem;
            font-style: italic;
            margin: 32px 0;
        }
        .edit-btn {
            background: linear-gradient(90deg, #00c6ff 0%, #232946 100%);
            color: #fff;
            font-weight: 700;
            border-radius: 8px;
            font-size: 0.98rem;
            padding: 6px 16px;
            border: none;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            box-shadow: 0 2px 8px rgba(0,198,255,0.07);
        }
        .edit-btn:hover {
            background: linear-gradient(90deg, #232946 0%, #00c6ff 100%);
            color: #fff;
        }
        .delete-btn {
            background: none;
            border: 2px solid #dc3545;
            color: #dc3545;
            font-size: 1.1rem;
            padding: 5px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .delete-btn:hover {
            background: #dc3545;
            color: #fff;
        }
        /* Modal */
        #updateModal, #addModal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(44,62,80,0.18);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #fff;
            border-radius: 18px !important;
            box-shadow: 0 8px 32px rgba(44,62,80,0.18) !important;
            padding: 32px 28px;
            max-width: 420px;
            width: 95%;
            position: relative;
        }
        .modal-content h3 {
            font-size: 1.4rem;
            font-weight: 800;
            color: #232946;
        }
        .modal-content label {
            font-weight: 700;
            color: #232946;
            display: block;
            margin-bottom: 4px;
        }
        .modal-content input, .modal-content select {
            border-radius: 8px;
            border: 2px solid #e0e6f7;
            padding: 8px 12px;
            font-size: 1.08rem;
            background: #fafdff;
            margin-top: 4px;
            width: 100%;
            box-sizing: border-box;
        }
        .modal-content input:focus, .modal-content select:focus {
            border: 2px solid #00c6ff;
            outline: none;
        }
        .modal-close {
            position: absolute;
            top: 18px;
            right: 22px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #232946;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .modal-close:hover {
            opacity: 1;
        }
        .modal-submit-btn {
            background: linear-gradient(90deg, #00c6ff 0%, #232946 100%);
            color: #fff;
            font-weight: 700;
            border-radius: 10px;
            font-size: 1.08rem;
            padding: 10px 26px;
            border: none;
            cursor: pointer;
            width: 100%;
            margin-top: 14px;
            transition: background 0.2s;
        }
        .modal-submit-btn:hover {
            background: linear-gradient(90deg, #232946 0%, #00c6ff 100%);
        }
        .alert-warning {
            margin-bottom: 18px;
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            color: #856404;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="availability-container">
    <a th:href="@{/admin/doctors/info}" class="back-link">
        <i class="fa-solid fa-arrow-left"></i> Back
    </a>
    <div class="availability-title">
        <i class="fa-solid fa-calendar-check"></i> Doctor Availability
    </div>
    <!-- Error message block -->
    <div th:if="${errorMessage}" class="alert-warning" th:text="${errorMessage}"></div>
    <div style="display:flex;justify-content:flex-end;margin-bottom:18px;">
        <button class="add-btn" type="button" onclick="openAddModal()">
            <i class="fa-solid fa-plus"></i> Add Availability
        </button>
    </div>
    <div th:if="${#lists.isEmpty(availabilities)}" class="no-data">
        <i class="fa-solid fa-triangle-exclamation"></i> No Data Exist
    </div>
    <div class="avail-cards">
        <div class="avail-card" th:each="availability : ${availabilities}">
            <i class="fa-solid fa-calendar-day card-icon"></i>
            <div class="card-day" th:text="${availability.workingDay}"></div>
            <div class="card-time"><i class="fa-solid fa-clock"></i> Start: <span th:text="${#temporals.format(availability.startTime,'hh:mm a')}"></span></div>
            <div class="card-time"><i class="fa-solid fa-clock"></i> End: <span th:text="${#temporals.format(availability.endTime,'hh:mm a')}"></span></div>
            <div class="card-actions">
                <button class="update-btn edit-btn" title="Edit"
                        th:data-id="${availability.id}"
                        th:data-day="${availability.workingDay}"
                        th:data-start="${#temporals.format(availability.startTime,'HH:mm')}"
                        th:data-end="${#temporals.format(availability.endTime,'HH:mm')}">
                    <i class="fa-solid fa-pen-to-square"></i>Update
                </button>
                <form method="post" th:action="@{'/admin/doctors/' + ${doctorId} + '/delete_availability/' + ${availability.id}}" style="display:inline;margin:0;">
                    <button type="submit" class="delete-btn" title="Delete"
                            onclick="return confirm('Are you sure you want to delete this availability?');">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
<!-- Update Modal -->
<div th:if="${!#lists.isEmpty(availabilities)}">
    <div id="updateModal">
        <div class="modal-content">
            <span id="closeUpdateModal" class="modal-close">&times;</span>
            <h3 style="text-align:center;margin-bottom:18px;">
                <i class="fa-solid fa-pen-to-square" style="color:#00c6ff;"></i> Update Availability
            </h3>
            <form method="post"
                  th:action="@{'/admin/doctors/' + ${doctorId} + '/update_availability'}">
                <input type="hidden" id="availabilityId" name="id">
                <div style="margin-bottom:14px;">
                    <label for="updateWorkingDay">Day</label>
                    <input type="text" id="updateWorkingDay" name="workingDay" readonly>
                </div>
                <div style="margin-bottom:14px;">
                    <label for="updateStartTime">Start Time</label>
                    <input type="time" id="updateStartTime" name="startTime" required>
                </div>
                <div style="margin-bottom:14px;">
                    <label for="updateEndTime">End Time</label>
                    <input type="time" id="updateEndTime" name="endTime" required>
                </div>
                <button type="submit" class="modal-submit-btn">
                    <i class="fa-solid fa-floppy-disk"></i> Save Changes
                </button>
            </form>
        </div>
    </div>
</div>
<!-- Add Availability Modal -->
<div id="addModal">
    <div class="modal-content">
        <span id="closeAddModal" class="modal-close">&times;</span>
        <h3 style="text-align:center;margin-bottom:18px;">
            <i class="fa-solid fa-plus" style="color:#00c6ff;"></i> Add Availability
        </h3>
        <form method="post" th:action="@{'/admin/doctors/' + ${doctorId} + '/add_availability'}">
            <div style="margin-bottom:14px;">
                <label for="addWorkingDay">Day</label>
                <select id="addWorkingDay" name="workingDay" required>
                    <option value="">Select Day</option>
                    <option th:each="day : ${T(com.example.demo.Enum.WorkingDay).values()}" th:value="${day}" th:text="${day}"></option>
                </select>
            </div>
            <div style="margin-bottom:14px;">
                <label for="addStartTime">Start Time</label>
                <input type="time" id="addStartTime" name="startTime" required>
            </div>
            <div style="margin-bottom:14px;">
                <label for="addEndTime">End Time</label>
                <input type="time" id="addEndTime" name="endTime" required>
            </div>
            <button type="submit" class="modal-submit-btn">
                <i class="fa-solid fa-floppy-disk"></i> Save Availability
            </button>
        </form>
    </div>
</div>
<script>
    document.querySelectorAll(".update-btn").forEach(button => {
        button.addEventListener("click", function(){
            document.getElementById("availabilityId").value = this.dataset.id;
            document.getElementById("updateWorkingDay").value = this.dataset.day;
            document.getElementById("updateStartTime").value = this.dataset.start;
            document.getElementById("updateEndTime").value = this.dataset.end;
            document.getElementById("updateModal").style.display = "flex";
        });
    });
    const closeUpdateBtn = document.getElementById("closeUpdateModal");
    if(closeUpdateBtn){
        closeUpdateBtn.onclick = function(){
            document.getElementById("updateModal").style.display = "none";
        }
    }
    function openAddModal() {
        document.getElementById('addModal').style.display = 'flex';
    }
    document.getElementById('closeAddModal').onclick = function() {
        document.getElementById('addModal').style.display = 'none';
    };
    window.onclick = function(event){
        const updateModal = document.getElementById("updateModal");
        const addModal = document.getElementById("addModal");
        if(updateModal && event.target === updateModal) updateModal.style.display = "none";
        if(addModal && event.target === addModal) addModal.style.display = "none";
    }
</script>
</body>
</html>
