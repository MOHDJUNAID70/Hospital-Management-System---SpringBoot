<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Doctor Appointments</title>
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(120deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
        }
        .appointments-container {
            max-width: 1100px;
            margin: 48px auto 0 auto;
            background: rgba(255,255,255,0.98);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(44,62,80,0.10);
            padding: 40px 32px 32px 32px;
            position: relative;
        }
        .appointments-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 32px;
            color: #232946;
            letter-spacing: 1px;
            text-shadow: 0 2px 8px rgba(0,198,255,0.08);
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #232946;
            font-weight: 700;
            font-size: 1.08rem;
            margin-bottom: 18px;
            padding: 8px 16px;
            border-radius: 10px;
            transition: background 0.2s, color 0.2s;
        }
        .back-link:hover {
            background: linear-gradient(90deg, #00c6ff 0%, #232946 100%);
            color: #fff;
        }
        .back-link i {
            font-size: 1.1rem;
        }
        .alert-warning {
            margin-bottom: 18px;
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            color: #856404;
            font-weight: 600;
        }
        .appt-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
            justify-content: center;
        }
        .appt-card {
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(44,62,80,0.10);
            padding: 28px 24px 20px 24px;
            min-width: 260px;
            max-width: 300px;
            flex: 1 1 260px;
            text-align: center;
            transition: box-shadow 0.2s, transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .appt-card:hover {
            box-shadow: 0 8px 32px rgba(0,198,255,0.18);
            transform: translateY(-4px);
        }
        .appt-card .card-icon {
            font-size: 2.2rem;
            color: #00c6ff;
            margin-bottom: 10px;
        }
        .appt-card .card-id {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 6px;
        }
        .appt-card .card-patient {
            font-size: 1.25rem;
            font-weight: 800;
            color: #232946;
            margin-bottom: 4px;
        }
        .appt-card .card-detail {
            font-size: 1rem;
            color: #555;
            margin-bottom: 4px;
        }
        .appt-card .card-detail span {
            font-weight: 700;
            color: #232946;
        }
        .appt-card .card-badge {
            display: inline-block;
            font-size: 0.88rem;
            font-weight: 700;
            padding: 4px 14px;
            border-radius: 20px;
            margin: 8px 0 6px 0;
            letter-spacing: 0.5px;
        }
        .badge-booked {
            background: #d1f7c4;
            color: #2e7d32;
        }
        .badge-cancelled {
            background: #ffcdd2;
            color: #c62828;
        }
        .badge-completed {
            background: #bbdefb;
            color: #1565c0;
        }
        .badge-pending {
            background: #fff3cd;
            color: #856404;
        }
        .badge-default {
            background: linear-gradient(90deg, #00c6ff 0%, #232946 100%);
            color: #fff;
        }
        .appt-card .card-actions {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 18px;
            width: 100%;
            border-top: 1px solid #e3e9f7;
            padding-top: 14px;
        }
        .no-data {
            text-align: center;
            color: #a94442;
            font-size: 1.2rem;
            font-style: italic;
            margin: 32px 0;
        }
    </style>
</head>
<body>
<div class="appointments-container">
    <a th:href="@{/admin/doctors/info}" class="back-link">
        <i class="fa-solid fa-arrow-left"></i> Back
    </a>
    <div class="appointments-title">
        <i class="fa-solid fa-notes-medical"></i> Doctor Appointments
    </div>
    <!-- Error message block -->
    <div th:if="${errorMessage}" class="alert-warning" th:text="${errorMessage}"></div>
    <div th:if="${#lists.isEmpty(appointments)}" class="no-data">
        <i class="fa-solid fa-triangle-exclamation"></i> No Appointments Exist
    </div>
    <div class="appt-cards">
        <div class="appt-card" th:each="appt : ${appointments}">
            <i class="fa-solid fa-calendar-check card-icon"></i>
            <div class="card-id">Appointment #<span th:text="${appt.id}"></span></div>
            <div class="card-patient">Patient Name: </i><span th:text="${appt.patientInfo.name}"></span></div>
            <div class="card-detail"><i class="fa-solid fa-user-doctor"></i> <span th:text="${appt.doctorInfo.name}"></span></div>
            <div class="card-detail"><i class="fa-solid fa-stethoscope"></i> <span th:text="${appt.doctorInfo.specialization}"></span></div>
            <div class="card-detail"><i class="fa-solid fa-calendar-day"></i> Date: <span th:text="${appt.appointmentDate}"></span></div>
            <div class="card-detail"><i class="fa-solid fa-clock"></i> Time: <span th:text="${#temporals.format(appt.appointmentTime,'hh:mm a')}"></span> - <span th:text="${#temporals.format(appt.appointmentEndTime,'hh:mm a')}"></span></div>
            <div class="card-badge"
                 th:classappend="${appt.status.name() == 'Booked'} ? 'badge-booked' : (${appt.status.name() == 'Cancelled'} ? 'badge-cancelled' : (${appt.status.name() == 'Completed'} ? 'badge-completed' : 'badge-default'))"
                 th:text="${appt.status}"></div>
        </div>
    </div>
</div>
</body>
</html>
